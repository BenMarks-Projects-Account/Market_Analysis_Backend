<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BenTrade — Decision Response Card Demo</title>

<!-- BenTrade core styles -->
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="stylesheet" href="../assets/css/module-dashboard.css">
<link rel="stylesheet" href="../assets/css/decision-response-card.css">

<style>
  body {
    background: var(--bg, #02040a);
    color: var(--text, #d7fbff);
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0;
    padding: 24px;
  }
  .demo-title {
    font-family: 'Exo 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--cyan, #00eaff);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .demo-subtitle {
    font-size: 12px;
    color: var(--muted, #93a7b6);
    margin-bottom: 24px;
  }
  .demo-section {
    margin-bottom: 32px;
  }
  .demo-label {
    font-family: 'Exo 2', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--warn, #f4c85f);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.8;
  }
  .demo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
</style>
</head>
<body>

<div class="demo-title">Decision Response Card — Demo</div>
<div class="demo-subtitle">
  All five decision states rendered with the same card component.
  Each card uses the Final Decision Response Contract v1 schema.
</div>

<div class="demo-grid">
  <!-- Cards will be injected here by JS -->
  <div class="demo-section" id="card-approve"></div>
  <div class="demo-section" id="card-cautious"></div>
  <div class="demo-section" id="card-watchlist"></div>
  <div class="demo-section" id="card-reject"></div>
  <div class="demo-section" id="card-insufficient"></div>
</div>

<!-- Decision Response Card renderer -->
<script src="../assets/js/ui/decision_response_card.js"></script>

<script>

      'Invalidate if FOMC statement is unexpectedly hawkish',

      'Review position sizing after FOMC',
      'Monitor sector correlation with existing TQQQ position',
    ],
    warning_flags: [
      'event_risk_within_window',
      'portfolio_sector_concentration_elevated',
    ],
    evidence: { symbol: 'QQQ', strategy: 'put_credit_spread' },
    metadata: { source: 'model', response_version: '1.0' },

  // ── Mount cards ───────────────────────────────────────────────────

  var Card = window.BenTradeDecisionCard;

  Card.mount(approveResponse,      document.getElementById('card-approve'));
  Card.mount(cautiousResponse,     document.getElementById('card-cautious'));
  Card.mount(watchlistResponse,    document.getElementById('card-watchlist'));
  Card.mount(rejectResponse,       document.getElementById('card-reject'));
  Card.mount(insufficientResponse, document.getElementById('card-insufficient'));

</script>
</body>
</html>
