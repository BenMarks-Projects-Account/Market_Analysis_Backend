        <option value="any">Any Score (&gt;0)</option>
      </select>
    </div>
    <div class="ce-filter-actions">
      <button id="ce-clear-filters" class="ce-filter-clear" style="display:none;">&#x2715; Clear</button>
      <span id="ce-filter-count" class="ce-filter-results-count"></span>
    </div>
    <div class="ce-filter-search">
      <input id="ce-search-input" type="text" placeholder="Search symbol or name…" class="ce-search-input">
    </div>
  </div>

  <!-- Row 4: Add Stock + Action buttons -->
  <div class="ce-actions-row">
    <div class="ce-add-stock-group">
      <span style="color:rgba(224,224,224,0.35); font-size:0.85rem;">&#x2795;</span>
      <input id="ce-add-stock-input" type="text" placeholder="Add stock symbol…" maxlength="10" class="ce-add-stock-input">
      <button id="ce-add-stock-btn" class="ce-btn-add">Add</button>
      <span id="ce-add-stock-status" class="ce-add-status"></span>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="ce-refresh-btn" class="ce-btn-action">Refresh</button>
      <button id="ce-crawl-btn" class="ce-btn-action ce-btn-crawl">Run Crawler</button>
    </div>
  </div>

  <!-- Ranked Table -->
  <div id="ce-table-container"></div>

  <!-- Company Detail Drawer (hidden by default) -->
  <div id="ce-detail-drawer" style="display:none; position:fixed; top:0; right:0; width:520px; height:100vh;
       background:#0d1117; border-left:1px solid rgba(255,255,255,0.1); z-index:3000; overflow-y:auto;
       box-shadow:-4px 0 20px rgba(0,0,0,0.5); padding:20px;">
  </div>
</div>
