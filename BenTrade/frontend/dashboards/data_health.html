<div class="view-wrap">
  <div class="stock-card">
    <div class="stock-toolbar">
      <div class="stock-inputs">
        <button id="dhRefreshBtn" class="btn">Refresh</button>
      </div>
    </div>
    <div id="dhError" class="active-error" style="display:none;"></div>
  </div>

  <!-- Platform Data Source Toggle -->
  <div class="stock-card" id="dhPlatformDataSourceCard">
    <div class="stock-card-title">Platform Data Source</div>
    <div id="dhDataSourcePanel" style="padding: 8px 0;">
      <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
        <div id="dhDataSourceToggle" class="ds-toggle-group" role="radiogroup" aria-label="Platform Data Source">
          <button type="button" class="ds-toggle-btn" data-mode="live" aria-pressed="false">
            <span class="ds-toggle-icon">&#9679;</span> Live Market Data
          </button>
          <button type="button" class="ds-toggle-btn" data-mode="snapshot" aria-pressed="false">
            <span class="ds-toggle-icon">&#9673;</span> Offline Market Data (Snapshots)
          </button>
        </div>
        <div id="dhDataSourceMeta" class="stock-note" style="font-size: 0.85em; color: var(--text-muted, #888);"></div>
      </div>
      <div id="dhDataSourceWarning" class="active-error" style="display:none; margin-top:8px; font-size:0.9em;"></div>
    </div>
  </div>

  <div class="stock-card">
    <div class="stock-card-title">Provider Health</div>
    <div id="dhProviderTiles" class="stock-summary-grid"></div>
  </div>

  <div class="stock-layout">
    <section class="stock-panel stock-main">
      <div class="stock-card">
        <div class="stock-card-title">Recent Validation Events</div>
        <div class="risk-table-wrap">
          <table class="risk-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Severity</th>
                <th>Code</th>
                <th>Symbol / Trade Key</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="dhEventsBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <aside class="stock-panel stock-side">
      <div class="stock-card">
        <div class="stock-card-title">Top Validation Codes</div>
        <div id="dhTopCodes" class="stock-notes"></div>
      </div>
      <div class="stock-card">
        <div class="stock-card-title">Severity Totals</div>
        <div id="dhSeverityCounts" class="stock-notes"></div>
      </div>
    </aside>
  </div>
</div>
