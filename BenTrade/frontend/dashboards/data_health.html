<div class="view-wrap">
  <div class="stock-card">
    <div class="stock-toolbar">
      <div class="stock-inputs">
        <button id="dhRefreshBtn" class="btn">Refresh</button>
      </div>
    </div>
    <div id="dhError" class="active-error" style="display:none;"></div>
  </div>

  <!-- Platform Data Source Toggle -->
  <div class="stock-card" id="dhPlatformDataSourceCard">
    <div class="stock-card-title">Platform Data Source</div>
    <div id="dhDataSourcePanel" class="dh-ds-panel">
      <div class="dh-ds-row">
        <div id="dhDataSourceToggle" class="dh-ds-toggle" role="radiogroup" aria-label="Platform Data Source">
          <button type="button" class="dh-ds-btn" data-mode="live" aria-pressed="false">
            <span class="dh-ds-dot dh-ds-dot--live"></span> Live
          </button>
          <button type="button" class="dh-ds-btn" data-mode="snapshot" aria-pressed="false">
            <span class="dh-ds-dot dh-ds-dot--snap"></span> Offline
          </button>
        </div>
        <button type="button" id="dhCaptureBtn" class="dh-capture-btn" title="Capture a balanced snapshot for all scanner symbols">
          <span class="dh-capture-icon">&#9207;</span> Capture Snapshot
        </button>
      </div>
      <div id="dhDataSourceMeta" class="dh-ds-meta"></div>
      <div id="dhCaptureStatus" class="dh-capture-status" style="display:none;"></div>
      <div id="dhDataSourceWarning" class="active-error" style="display:none; margin-top:8px; font-size:0.9em;"></div>
    </div>
  </div>

  <!-- Model Source Toggle -->
  <div class="stock-card" id="dhModelSourceCard">
    <div class="stock-card-title">Model Source</div>
    <div id="dhModelSourcePanel" class="dh-ds-panel">
      <div class="dh-ds-row">
        <div id="dhModelSourceToggle" class="dh-ds-toggle" role="radiogroup" aria-label="Model Source">
        </div>
      </div>
      <div id="dhModelSourceMeta" class="dh-ds-meta"></div>
    </div>
  </div>

  <div class="stock-card">
    <div class="stock-card-title">Provider Health</div>
    <div id="dhProviderTiles" class="stock-summary-grid"></div>
  </div>

  <div class="stock-layout">
    <section class="stock-panel stock-main">
      <div class="stock-card">
        <div class="stock-card-title">Recent Validation Events</div>
        <div class="risk-table-wrap">
          <table class="risk-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Severity</th>
                <th>Code</th>
                <th>Symbol / Trade Key</th>
                <th>Message</th>
              </tr>
            </thead>
            <tbody id="dhEventsBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <aside class="stock-panel stock-side">
      <div class="stock-card">
        <div class="stock-card-title">Top Validation Codes</div>
        <div id="dhTopCodes" class="stock-notes"></div>
      </div>
      <div class="stock-card">
        <div class="stock-card-title">Severity Totals</div>
        <div id="dhSeverityCounts" class="stock-notes"></div>
      </div>
    </aside>
  </div>
</div>
